<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>小新肌 預約管理</title>
<style>
:root {
  --bg:#F7F5F2; --surface:#FFF; --border:#E8E4DE;
  --text:#1A1A1A; --text2:#6B6660; --text3:#9E9A95;
  --accent:#C9A882; --accent-l:#F5EDE2;
  --green:#4CAF50; --green-l:#E8F5E9;
  --red:#E53935; --red-l:#FFEBEE;
  --amber:#F59E0B; --amber-l:#FEF3C7;
  --blue:#3B82F6; --blue-l:#EFF6FF;
  --polly:#7C3AED; --polly-l:#EDE9FE;
  --irene:#0891B2; --irene-l:#E0F7FA;
  --su:#16A34A; --su-l:#DCFCE7;
  --gina:#D97706; --gina-l:#FEF3C7;
  --caicai:#DB2777; --caicai-l:#FCE7F3;
  --r:12px; --rsm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;color:var(--text);min-height:100vh}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;height:56px;position:sticky;top:0;z-index:100;gap:8px}
.nav-logo{font-size:15px;font-weight:600;flex:1}.nav-logo span{color:var(--accent)}
.tab-bar{display:flex;gap:4px;background:var(--bg);border-radius:var(--rsm);padding:3px}
.tab{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

/* PAGES */
.page{display:none;padding:16px;max-width:680px;margin:0 auto}
.page.active{display:block}

/* COMMON */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px 18px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.06em;margin-bottom:14px}
.field{margin-bottom:13px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rsm);padding:11px 13px;font-size:15px;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--surface)}
.field textarea{min-height:56px;resize:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* DATE BAR */
.date-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.date-bar input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 13px;font-size:15px;color:var(--text);outline:none}
.btn-today{padding:10px 14px;background:var(--accent-l);color:var(--accent);border:none;border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}

/* CLINIC + LEAVE BANNER */
.info-banner{display:flex;align-items:center;gap:8px;border-radius:var(--rsm);padding:10px 13px;margin-bottom:10px;font-size:13px}
.info-banner.clinic{background:var(--blue-l);border:1px solid #BFDBFE}
.info-banner.no-clinic{background:var(--bg);border:1px solid var(--border);color:var(--text3)}
.info-banner.leave{background:var(--red-l);border:1px solid #FECACA}
.info-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-blue{background:var(--blue)}.dot-red{background:var(--red)}.dot-gray{background:var(--text3)}

/* SUMMARY */
.summary-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px}
.staff-chip{border-radius:var(--rsm);padding:8px 5px;text-align:center}
.staff-chip .sname{font-size:11px;font-weight:700}
.staff-chip .scount{font-size:20px;font-weight:700;margin-top:1px}
.staff-chip.off{opacity:.35;position:relative}
.staff-chip.off::after{content:"休";font-size:10px;font-weight:700;position:absolute;top:4px;right:4px;color:var(--red)}
.chip-polly{background:var(--polly-l);color:var(--polly)}
.chip-irene{background:var(--irene-l);color:var(--irene)}
.chip-su{background:var(--su-l);color:var(--su)}
.chip-gina{background:var(--gina-l);color:var(--gina)}
.chip-caicai{background:var(--caicai-l);color:var(--caicai)}

/* TIMELINE */
.booking-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:12px 14px;display:flex;gap:11px;margin-bottom:6px;cursor:pointer;transition:box-shadow .15s}
.booking-card.needs-reassign{border-color:var(--red);border-left:3px solid var(--red)}
.booking-card:active{box-shadow:var(--shadow-md)}
.tc{min-width:42px;text-align:right;padding-top:2px}
.tc .tt{font-size:13px;font-weight:700}.tc .ap{font-size:10px;color:var(--text3)}
.vline{width:1px;background:var(--border);align-self:stretch;flex-shrink:0}
.ic{flex:1;min-width:0}
.bname{font-size:15px;font-weight:600}
.btx{font-size:13px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bnote{font-size:12px;color:var(--text3);margin-top:3px}
.tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.tag-Polly{background:var(--polly-l);color:var(--polly)}
.tag-Irene{background:var(--irene-l);color:var(--irene)}
.tag-小蘇{background:var(--su-l);color:var(--su)}
.tag-Gina{background:var(--gina-l);color:var(--gina)}
.tag-菜菜{background:var(--caicai-l);color:var(--caicai)}
.tag-reassign{background:var(--red-l);color:var(--red)}
.tag-ma{background:var(--amber-l);color:#92400E}
.tag-new{background:var(--green-l);color:#166534}
.empty-state{text-align:center;padding:48px 0;color:var(--text3);font-size:14px}

/* TX GRID */
.tx-grid{display:flex;flex-wrap:wrap;gap:6px}
.tx-sec{width:100%;font-size:11px;color:var(--text3);font-weight:700;margin-top:6px}
.tx-chip{padding:7px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;user-select:none}
.tx-chip.sel{background:var(--accent-l);border-color:var(--accent);color:#7C5533;font-weight:600}

/* SLOTS */
.slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.slot-btn{padding:9px 4px;border-radius:var(--rsm);border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s;color:var(--text)}
.slot-btn.b1{border-color:#FCD34D}.slot-btn.b2{border-color:#F97316}.slot-btn.b3{border-color:var(--red);color:var(--red)}
.slot-btn.full{background:var(--bg);color:var(--text3);border-style:dashed;cursor:default}
.slot-btn.unavail{background:#F3F4F6;color:var(--text3);border-style:dashed;cursor:not-allowed;font-size:11px}
.slot-btn.sel{background:var(--accent);border-color:var(--accent);color:#FFF}
.dot-row{display:flex;gap:2px;justify-content:center;margin-top:3px}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.4}
.slot-hint{font-size:12px;color:var(--text3);margin-top:4px;line-height:1.6}

/* RESULT */
.result-card{background:var(--accent-l);border:2px solid var(--accent);border-radius:var(--r);padding:15px 17px;margin-bottom:14px}
.rl{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.08em;margin-bottom:5px}
.rs{font-size:22px;font-weight:700}
.rrow{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
.rchip{background:var(--surface);border-radius:var(--rsm);padding:5px 11px;font-size:13px;font-weight:600}
.rma{background:var(--amber-l);color:#92400E}

/* LEAVE TABLE */
.leave-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.leave-col{text-align:center}
.leave-col .lname{font-size:12px;font-weight:700;padding:5px 0;border-radius:var(--rsm) var(--rsm) 0 0;margin-bottom:4px}
.leave-day{font-size:12px;padding:4px 6px;border-radius:4px;margin-bottom:3px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);text-align:center}
.leave-day.on{background:var(--red-l);border-color:#FECACA;color:var(--red);font-weight:700}
.add-leave{font-size:12px;padding:5px;border-radius:4px;border:1.5px dashed var(--border);background:none;color:var(--text3);cursor:pointer;width:100%;margin-top:2px}

/* BUTTONS */
.btn-primary{width:100%;padding:15px;background:var(--accent);color:#FFF;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s;letter-spacing:.02em}
.btn-primary:active{opacity:.85}.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{padding:10px 16px;background:none;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:14px;color:var(--text2);cursor:pointer}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r) var(--r) 0 0;width:100%;max-height:82vh;overflow-y:auto;padding:20px 18px 36px}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px}
.mf{margin-bottom:11px}.mf .ml{font-size:12px;color:var(--text3);margin-bottom:2px}.mf .mv{font-size:15px;font-weight:500}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-cancel-bk{flex:1;padding:13px;background:var(--red-l);color:var(--red);border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer}
.btn-reassign{flex:1;padding:13px;background:var(--amber-l);color:#92400E;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer}
.btn-close-m{padding:13px 18px;background:var(--bg);border:none;border-radius:var(--r);font-size:15px;color:var(--text2);cursor:pointer}

/* CONFIG */
.cfg-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rsm);padding:10px 13px;font-size:13px;font-family:monospace;color:var(--text);outline:none}
.cfg-input:focus{border-color:var(--accent)}
.cfg-hint{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.6}
.sdot2{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.sdot2.ok{background:var(--green)}.sdot2.err{background:var(--red)}.sdot2.idle{background:var(--text3)}

/* LOADING */
.loading{text-align:center;padding:32px;color:var(--text3);font-size:14px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">小新<span>肌</span></div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('schedule')">排班</button>
    <button class="tab" onclick="switchTab('booking')">預約</button>
    <button class="tab" onclick="switchTab('leave')">休假</button>
    <button class="tab" onclick="switchTab('config')">設定</button>
  </div>
</nav>

<!-- ── 排班總覽 ── -->
<div id="page-schedule" class="page active">
  <div class="date-bar">
    <input type="date" id="sch-date" onchange="loadSchedule()">
    <button class="btn-today" onclick="setToday('sch-date',loadSchedule)">今天</button>
  </div>
  <div id="clinic-banner"></div>
  <div id="leave-banner"></div>
  <div id="summary-strip"></div>
  <div id="timeline"></div>
</div>

<!-- ── 新增預約 ── -->
<div id="page-booking" class="page">
  <div class="card">
    <div class="card-title">客人資料</div>
    <div class="row2">
      <div class="field"><label>姓名</label><input type="text" id="b-name" placeholder="王小明" autocomplete="off" oninput="onFormChange()"></div>
      <div class="field"><label>新 / 舊客</label><select id="b-type" onchange="onFormChange()"><option value="舊客">舊客</option><option value="新客">新客</option></select></div>
    </div>
    <div class="field"><label>電話（選填）</label><input type="tel" id="b-phone" placeholder="0912345678"></div>
    <div class="field"><label>同行者 / 備注</label><input type="text" id="b-note" placeholder="例：男友林駿閎、怕痛、Polly友" oninput="onFormChange()"></div>
  </div>

  <div class="card">
    <div class="card-title">療程</div>
    <div class="tx-grid" id="tx-grid"></div>
    <div class="field" style="margin-top:11px;margin-bottom:0">
      <label>其他（輸入後按 Enter）</label>
      <input type="text" id="b-custom" placeholder="自行輸入療程名稱" onkeydown="addCustomTx(event)">
    </div>
  </div>

  <div class="card">
    <div class="card-title">日期與時段</div>
    <div class="field"><label>日期</label><input type="date" id="b-date" onchange="loadSlots()"></div>
    <div id="slot-area"></div>
  </div>

  <div id="result-area"></div>
  <button class="btn-primary" id="submit-btn" onclick="submitBooking()" disabled>確認預約</button>
  <div style="height:24px"></div>
</div>

<!-- ── 休假管理 ── -->
<div id="page-leave" class="page">
  <div class="card">
    <div class="card-title">選擇月份</div>
    <div class="date-bar" style="margin-bottom:0">
      <input type="month" id="leave-month" onchange="renderLeaveGrid()">
    </div>
  </div>
  <div class="card">
    <div class="card-title">休假日登記（點日期切換）</div>
    <div class="leave-grid" id="leave-grid"></div>
    <div style="font-size:12px;color:var(--text3);margin-top:4px">點選日期標記休假。資料儲存在本機，重要異動請同步更新 Google Sheets「休假表」分頁。</div>
  </div>
  <button class="btn-primary" onclick="saveLeave()">儲存本月休假</button>
  <div style="height:24px"></div>
</div>

<!-- ── 設定 ── -->
<div id="page-config" class="page">
  <div class="card">
    <div class="card-title">APPS SCRIPT 網址</div>
    <input class="cfg-input" id="api-url" placeholder="https://script.google.com/macros/s/…/exec" oninput="saveConfig()">
    <div class="cfg-hint">Sheets → 擴充功能 → Apps Script → 部署 → 管理部署 → 複製「網路應用程式」網址貼這裡。</div>
  </div>
  <div class="card">
    <div class="card-title">連線狀態</div>
    <div id="conn-status" style="font-size:14px;display:flex;align-items:center"><span class="sdot2 idle"></span>尚未測試</div>
    <button class="btn-ghost" style="margin-top:10px;width:100%" onclick="testConn()">測試連線</button>
  </div>
  <div class="card" style="background:var(--accent-l);border-color:var(--accent)">
    <div class="card-title" style="color:var(--accent)">使用說明</div>
    <div style="font-size:13px;color:#7C5533;line-height:1.9">
      <b>排班</b> — 查看當日完整排班與人員分配<br>
      <b>預約</b> — 新增客人預約，自動建議人員與時段<br>
      <b>休假</b> — 每月初登記各人員休假日，排班與新增預約時自動跳過休假人員<br>
      <b>設定</b> — 填入 Apps Script 網址後即時同步 Google Sheets
    </div>
  </div>
</div>

<!-- 詳情 Modal -->
<div class="overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────
const STAFF = ["Polly","Irene","小蘇","Gina","菜菜"];
const STAFF_CLS = {Polly:"polly",Irene:"irene","小蘇":"su",Gina:"gina","菜菜":"caicai"};

const TREATMENTS = [
  {l:"腋下除毛",c:"除毛"},{l:"小腿除毛",c:"除毛"},{l:"大腿除毛",c:"除毛"},
  {l:"手臂除毛",c:"除毛"},{l:"全臉除毛",c:"除毛"},{l:"鬍子",c:"除毛"},
  {l:"VIO",c:"除毛"},{l:"VBO",c:"除毛"},
  {l:"皮秒",c:"雷射"},{l:"皮秒蜂巢",c:"雷射"},{l:"水飛梭",c:"雷射"},
  {l:"除刺青",c:"雷射"},{l:"靜脈雷射",c:"雷射"},
  {l:"肉毒",c:"注射"},{l:"填充",c:"注射"},{l:"玻尿酸",c:"注射"},
  {l:"水光針",c:"注射"},{l:"消脂針",c:"注射"},{l:"熊貓針",c:"注射"},
  {l:"精靈針",c:"注射"},{l:"鼻雕",c:"注射"},
  {l:"埋線",c:"提拉"},{l:"子母線",c:"提拉"},{l:"電波",c:"提拉"},
  {l:"音波",c:"提拉"},{l:"鳳凰電波",c:"提拉"},
  {l:"Onda",c:"能量"},{l:"Onda Pro",c:"能量"},
  {l:"清粉刺",c:"美療"},{l:"美療",c:"美療"},{l:"疤痕修復",c:"美療"},
  {l:"猛健樂",c:"點滴"},{l:"防曬點滴",c:"點滴"},{l:"美白點滴",c:"點滴"},
  {l:"保肝點滴",c:"點滴"},{l:"消脂點滴",c:"點滴"},{l:"生日點滴",c:"點滴"},
  {l:"貴婦點滴",c:"點滴"},{l:"嫩膚點滴",c:"點滴"},
  {l:"諮詢",c:"其他"},
];

const ANES_TX = ["鬍子","全臉除毛","臉部除毛","VIO","VBO","皮秒","皮秒蜂巢","水光針",
  "填充","玻尿酸","熊貓針","精靈針","子母線","埋線","電波","音波","鳳凰電波",
  "消脂針","鼻雕","除刺青","靜脈雷射","膠原蛋白","下巴填充","鼻線"];
const DRIP_TX  = ["猛健樂","點滴"];
const NON_DR   = ["水飛梭","清粉刺","美療","疤痕修復","點滴","猛健樂","腋下","小腿",
  "大腿","手臂","手指","腳趾","腳背","半背","全背","除毛","護理"];

// ── STATE ─────────────────────────────────────────────────────
let selectedTx = new Set();
let selectedSlot = "";
let selectedStaff = "";
let scheduleCache = [];
let currentModalIdx = null;
let slotsData = null;

// ── UTILS ─────────────────────────────────────────────────────
const getUrl   = ()=> localStorage.getItem("api_url")||"";
const saveConf = ()=> localStorage.setItem("api_url", document.getElementById("api-url").value.trim());
function saveConfig(){saveConf();}

function fmt(d){ const[y,m,dd]=d.split("-"); return`${y}/${m}/${dd}`; }
function toInput(d){ return d.replace(/\//g,"-"); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function thisMonth(){ return new Date().toISOString().slice(0,7); }

function needsAnes(txArr){ return txArr.some(t=>ANES_TX.some(a=>t.includes(a))); }
function isDrip(txArr){ return txArr.length>0&&txArr.every(t=>DRIP_TX.some(d=>t.includes(d))); }
function needsDoc(txArr){ return !txArr.every(t=>NON_DR.some(n=>t.includes(n))); }

function getLeaveData(month){ return JSON.parse(localStorage.getItem(`leave_${month}`)||"{}"); }
function isOnLeave(staff, dateStr){
  const month = dateStr.slice(0,7);
  const day   = dateStr.slice(8,10);
  const data  = getLeaveData(month);
  return (data[staff]||[]).includes(day);
}
function availableStaff(dateStr){
  return STAFF.filter(s=>!isOnLeave(s,dateStr));
}

function setToday(id, cb){
  document.getElementById(id).value = todayStr();
  if(cb) cb();
}

// ── STAFF ASSIGN ──────────────────────────────────────────────
function assignStaff(clientType, txArr, note, dateStr){
  const avail  = availableStaff(dateStr);
  const noteLC = (note||"").toLowerCase();
  if(noteLC.includes("polly")  && avail.includes("Polly"))  return "Polly";
  if(noteLC.includes("gina")   && avail.includes("Gina"))   return "Gina";
  if(isDrip(txArr)             && avail.includes("小蘇"))   return "小蘇";

  const isHair = txArr.every(t=>["腋下","小腿","大腿","手臂","手指","腳趾","腳背","半背","全背"].some(h=>t.includes(h)));
  const hasHigh = txArr.some(t=>["填充","玻尿酸","鼻雕","電波","音波","鳳凰電波","埋線","子母線","熊貓針","精靈針","除刺青"].some(h=>t.includes(h)));
  const hasConsult = txArr.some(t=>t.includes("諮詢"));
  const isNew = clientType==="新客";

  const gi = avail.filter(s=>s==="Gina"||s==="菜菜");
  const gi2 = gi.length>0? gi[Math.floor(Math.random()*gi.length)] : (avail[0]||"Gina");

  if(isNew && isHair && !hasHigh) return gi2;
  if(isNew || hasHigh || hasConsult){
    if(hasHigh){ return avail.includes("Polly")?"Polly":(avail.includes("Irene")?"Irene":gi2); }
    if(isNew){   return avail.includes("Polly")?"Polly":(avail.includes("Irene")?"Irene":gi2); }
    return avail.includes("Irene")?"Irene":(avail.includes("Polly")?"Polly":gi2);
  }
  return gi2;
}

// ── API ───────────────────────────────────────────────────────
async function api(params){
  const url=getUrl(); if(!url) throw new Error("請先設定 Apps Script 網址");
  const r=await fetch(`${url}?${new URLSearchParams(params)}`);
  return r.json();
}
async function apiPost(body){
  const url=getUrl(); if(!url) throw new Error("請先設定 Apps Script 網址");
  const r=await fetch(url,{method:"POST",body:JSON.stringify(body)});
  return r.json();
}

// ── TAB ───────────────────────────────────────────────────────
function switchTab(tab){
  const tabs=["schedule","booking","leave","config"];
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",tabs[i]===tab));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(`page-${tab}`).classList.add("active");
  if(tab==="schedule") loadSchedule();
  if(tab==="config"){ document.getElementById("api-url").value=getUrl(); }
  if(tab==="leave") initLeave();
}

// ── SCHEDULE ──────────────────────────────────────────────────
async function loadSchedule(){
  const dv = document.getElementById("sch-date").value||todayStr();
  document.getElementById("sch-date").value=dv;
  const dk = fmt(dv);
  const tl = document.getElementById("timeline");
  tl.innerHTML=`<div class="loading"><span class="spin"></span>載入中</div>`;

  // Leave banners
  const onLeave = STAFF.filter(s=>isOnLeave(s,dv));
  document.getElementById("leave-banner").innerHTML = onLeave.length?
    `<div class="info-banner leave"><span class="info-dot dot-red"></span><span>今日請假：<strong>${onLeave.join("、")}</strong>　已有預約需重新分配</span></div>`:"";

  if(!getUrl()){ renderDemoSched(dk,onLeave); return; }
  try{
    const[sched,clinic]=await Promise.all([
      api({action:"getSchedule",date:dk}),
      api({action:"getClinic",  date:dk})
    ]);
    scheduleCache=sched.bookings||[];
    renderClinicBanner(clinic);
    renderSummary(onLeave);
    renderTimeline(onLeave);
  }catch(e){ tl.innerHTML=`<div class="empty-state">⚠️ ${e.message}</div>`; }
}

function renderClinicBanner(clinic){
  const el=document.getElementById("clinic-banner");
  if(clinic.hasClinic){
    el.innerHTML=`<div class="info-banner clinic"><span class="info-dot dot-blue"></span><strong>${clinic.doctor}</strong>&nbsp;門診 ${clinic.start}–${clinic.end}</div>`;
  } else {
    el.innerHTML=`<div class="info-banner no-clinic"><span class="info-dot dot-gray"></span>今日無醫師門診，僅可安排美療項目</div>`;
  }
}

function renderSummary(onLeave){
  const counts={};
  STAFF.forEach(s=>counts[s]=0);
  scheduleCache.forEach(b=>{ if(counts[b.staff]!==undefined) counts[b.staff]++; });
  document.getElementById("summary-strip").innerHTML=STAFF.map(s=>{
    const cls=STAFF_CLS[s];
    const off=onLeave.includes(s)?" off":"";
    return`<div class="staff-chip chip-${cls}${off}"><div class="sname">${s}</div><div class="scount">${counts[s]}</div></div>`;
  }).join("");
}

function renderTimeline(onLeave){
  const tl=document.getElementById("timeline");
  if(!scheduleCache.length){ tl.innerHTML=`<div class="empty-state">今日尚無預約</div>`; return; }
  tl.innerHTML=scheduleCache.map((b,i)=>{
    const[h,m]=b.time.split(":");
    const h12=+h>12?+h-12:+h;
    const ap=+h<12?"上午":"下午";
    const needsR = onLeave.includes(b.staff);
    return`<div class="booking-card${needsR?" needs-reassign":""}" onclick="openModal(${i})">
      <div class="tc"><div class="tt">${h12}:${m}</div><div class="ap">${ap}</div></div>
      <div class="vline"></div>
      <div class="ic">
        <div class="bname">${b.name||"（無姓名）"}</div>
        <div class="btx">${b.treatment}</div>
        ${b.note?`<div class="bnote">${b.note}</div>`:""}
        <div class="tags">
          <span class="tag tag-${b.staff}">${b.staff||"未分配"}</span>
          ${needsR?'<span class="tag tag-reassign">⚠ 需重新分配</span>':""}
          ${b.anesthesia==="麻"?'<span class="tag tag-ma">上麻</span>':""}
          ${b.clientType==="新客"?'<span class="tag tag-new">新客</span>':""}
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(idx){
  const b=scheduleCache[idx]; if(!b) return;
  currentModalIdx=idx;
  const dv=document.getElementById("sch-date").value||todayStr();
  const onLeave=STAFF.filter(s=>isOnLeave(s,dv));
  const needsR=onLeave.includes(b.staff);
  document.getElementById("modal-title").textContent=b.name||"（無姓名）";
  document.getElementById("modal-body").innerHTML=`
    <div class="mf"><div class="ml">時間</div><div class="mv">${b.date} ${b.time}</div></div>
    <div class="mf"><div class="ml">療程</div><div class="mv">${b.treatment}</div></div>
    <div class="mf"><div class="ml">負責人員</div><div class="mv">${b.staff||"未分配"}${needsR?' <span style="color:var(--red);font-size:12px">（今日請假）</span>':""}</div></div>
    <div class="mf"><div class="ml">上麻</div><div class="mv">${b.anesthesia==="麻"?"✅ 需上麻藥":"— 不需上麻"}</div></div>
    ${b.note?`<div class="mf"><div class="ml">備注</div><div class="mv">${b.note}</div></div>`:""}
    ${needsR?`<div style="background:var(--red-l);border-radius:var(--rsm);padding:10px 13px;font-size:13px;color:var(--red);margin-top:8px">⚠ ${b.staff} 今日請假，此預約需重新分配給其他人員。</div>`:""}
  `;
  const acts=document.getElementById("modal-actions");
  if(needsR){
    acts.innerHTML=`
      <button class="btn-close-m" onclick="closeModal()">關閉</button>
      <button class="btn-reassign" onclick="reassignBooking(${idx})">重新分配</button>
      <button class="btn-cancel-bk" onclick="cancelBooking()">取消預約</button>`;
  } else {
    acts.innerHTML=`
      <button class="btn-close-m" onclick="closeModal()">關閉</button>
      <button class="btn-cancel-bk" onclick="cancelBooking()">取消預約</button>`;
  }
  document.getElementById("modal").classList.add("open");
}

function closeModal(e){
  if(!e||e.target===document.getElementById("modal"))
    document.getElementById("modal").classList.remove("open");
}

async function cancelBooking(){
  const b=scheduleCache[currentModalIdx]; if(!b) return;
  if(!confirm(`確定取消 ${b.name} 的預約？`)) return;
  try{
    if(getUrl()) await apiPost({action:"cancelBooking",row:b.row});
    closeModal(); loadSchedule();
  }catch(e){alert("❌ "+e.message);}
}

async function reassignBooking(idx){
  const b=scheduleCache[idx]; if(!b) return;
  const dv=document.getElementById("sch-date").value||todayStr();
  const avail=availableStaff(dv).filter(s=>s!==b.staff);
  if(!avail.length){ alert("今日所有人員均請假，無法重新分配。"); return; }
  const newStaff=prompt(`重新分配給誰？\n可選：${avail.join("、")}`);
  if(!newStaff||!avail.includes(newStaff)) return;
  try{
    if(getUrl()) await apiPost({action:"updateStaff",row:b.row,staff:newStaff});
    closeModal(); loadSchedule();
  }catch(e){alert("❌ "+e.message);}
}

// ── BOOKING FORM ──────────────────────────────────────────────
function buildTxGrid(){
  const g=document.getElementById("tx-grid");
  const cats=[...new Set(TREATMENTS.map(t=>t.c))];
  g.innerHTML=cats.map(cat=>{
    const chips=TREATMENTS.filter(t=>t.c===cat).map(t=>
      `<span class="tx-chip" data-tx="${t.l}" onclick="toggleTx(this)">${t.l}</span>`).join("");
    return`<span class="tx-sec">${cat}</span>${chips}`;
  }).join("");
}

function toggleTx(el){
  const tx=el.dataset.tx;
  if(selectedTx.has(tx)){selectedTx.delete(tx);el.classList.remove("sel");}
  else{selectedTx.add(tx);el.classList.add("sel");}
  loadSlots(); onFormChange();
}

function addCustomTx(e){
  if(e.key!=="Enter") return;
  const inp=document.getElementById("b-custom");
  const v=inp.value.trim(); if(!v) return;
  selectedTx.add(v);
  const g=document.getElementById("tx-grid");
  const c=document.createElement("span");
  c.className="tx-chip sel"; c.dataset.tx=v; c.textContent=v;
  c.onclick=()=>toggleTx(c); g.appendChild(c);
  inp.value=""; loadSlots(); onFormChange();
}

async function loadSlots(){
  const dv=document.getElementById("b-date").value;
  const sa=document.getElementById("slot-area");
  if(!dv||selectedTx.size===0){sa.innerHTML="";return;}
  const dk=fmt(dv);
  const txArr=[...selectedTx];
  sa.innerHTML=`<div class="loading"><span class="spin"></span>查詢可用時段</div>`;

  if(!getUrl()){renderDemoSlots(dv);return;}
  try{
    const data=await api({action:"getSlots",date:dk,treatments:txArr.join(",")});
    slotsData=data; renderSlots(data,dv);
  }catch(e){
    sa.innerHTML=`<div style="font-size:13px;color:var(--red);margin-top:8px">${e.message}</div>`;
  }
}

function renderDemoSlots(dv){
  const demo={
    slots:[
      {time:"12:30",bookingCount:0,available:true},
      {time:"13:00",bookingCount:1,available:true},{time:"13:30",bookingCount:0,available:true},
      {time:"14:00",bookingCount:2,available:true},{time:"14:30",bookingCount:0,available:true},
      {time:"15:00",bookingCount:3,available:true},{time:"15:30",bookingCount:1,available:true},
      {time:"16:00",bookingCount:0,available:true},{time:"16:30",bookingCount:4,available:true},
      {time:"17:00",bookingCount:5,available:false},{time:"17:30",bookingCount:0,available:true},
      {time:"18:00",bookingCount:1,available:true},{time:"18:30",bookingCount:0,available:true},
    ],
    hasClinic:true,needsDoctor:true,needsAnes:true,
    anesBuffer:true,
    clinic:{doctor:"王瑋璨醫師",start:"13:00",end:"20:00"},
    clinicStartMin:12*60+30, clinicEndMin:19*60+30
  };
  slotsData=demo; renderSlots(demo,dv);
}

function renderSlots(data,dv){
  const sa=document.getElementById("slot-area");
  const{slots,hasClinic,needsDoctor:nd,needsAnes:na,clinic,anesBuffer}=data;

  if(nd&&!hasClinic){
    sa.innerHTML=`<div style="font-size:13px;color:var(--red);padding:10px;background:var(--red-l);border-radius:var(--rsm);margin-top:8px">⚠ 此療程需要醫師在場，但當日無門診。請改選其他日期。</div>`;
    return;
  }

  let hint="";
  if(clinic){
    hint=`門診時段 ${clinic.start}–${clinic.end}`;
    if(na) hint+=`　上麻項目最早可約 ${minutesToTime((data.clinicStartMin||0)-30)} 起`;
    hint+=`　最晚預約 ${minutesToTime((data.clinicEndMin||0))}`;
  }

  // Check leave
  const onLeave=STAFF.filter(s=>isOnLeave(s,dv));
  const leaveHint=onLeave.length?`<div style="font-size:12px;color:var(--red);margin-top:6px">⚠ 今日 ${onLeave.join("、")} 請假，系統分配時將自動跳過</div>`:"";

  sa.innerHTML=(hint?`<div class="slot-hint">${hint}</div>`:"")+leaveHint+
    `<div class="slot-grid">`+(slots||[]).map(s=>{
      if(!s.available) return`<div class="slot-btn full">${s.time}</div>`;
      if(s.restricted) return`<div class="slot-btn unavail" title="${s.reason||""}">${s.time}<br>不可約</div>`;
      const bc=s.bookingCount>=4?"b3":s.bookingCount>=3?"b2":s.bookingCount>=2?"b1":"";
      const dots=s.bookingCount>0?`<div class="dot-row">${Array(Math.min(s.bookingCount,5)).fill('<span class="sdot"></span>').join("")}</div>`:"";
      return`<div class="slot-btn ${bc}" onclick="selectSlot('${s.time}',this)">${s.time}${dots}</div>`;
    }).join("")+`</div>`;
  selectedSlot=""; onFormChange();
}

function minutesToTime(m){
  const h=Math.floor(m/60),min=m%60;
  return`${String(h).padStart(2,"0")}:${String(min).padStart(2,"0")}`;
}

function selectSlot(time,el){
  document.querySelectorAll(".slot-btn").forEach(b=>b.classList.remove("sel"));
  el.classList.add("sel");
  selectedSlot=time; onFormChange();
}

function onFormChange(){
  updateResult(); updateSubmitBtn();
}

function updateResult(){
  const txArr=[...selectedTx];
  const name=document.getElementById("b-name").value.trim();
  const ct=document.getElementById("b-type").value;
  const note=document.getElementById("b-note").value.trim();
  const dv=document.getElementById("b-date").value;
  const el=document.getElementById("result-area");
  if(!txArr.length||!selectedSlot){el.innerHTML="";return;}
  selectedStaff=assignStaff(ct,txArr,note,dv);
  const ma=needsAnes(txArr);
  const cls=STAFF_CLS[selectedStaff]||"polly";
  const onLeave=availableStaff(dv).length<STAFF.length;
  el.innerHTML=`<div class="result-card">
    <div class="rl">建議安排</div>
    <div class="rs" style="color:var(--${cls})">${selectedStaff}</div>
    <div class="rrow">
      <span class="rchip">${dv} ${selectedSlot}</span>
      ${ma?'<span class="rchip rma">需上麻藥</span>':""}
      ${ct==="新客"?'<span class="rchip" style="background:var(--green-l);color:#166534">新客</span>':""}
      ${onLeave?'<span class="rchip" style="background:var(--red-l);color:var(--red)">今日有人請假</span>':""}
    </div>
  </div>`;
}

function updateSubmitBtn(){
  const ok=document.getElementById("b-name").value.trim()&&selectedSlot&&selectedTx.size>0;
  document.getElementById("submit-btn").disabled=!ok;
}

async function submitBooking(){
  const name=document.getElementById("b-name").value.trim();
  const phone=document.getElementById("b-phone").value.trim();
  const note=document.getElementById("b-note").value.trim();
  const txArr=[...selectedTx];
  const dv=document.getElementById("b-date").value;
  const ct=document.getElementById("b-type").value;
  const noteFull=[note,phone?`📞 ${phone}`:""].filter(Boolean).join(" ｜ ");
  if(!name||!selectedSlot||!txArr.length){alert("請填寫姓名、選療程及時段");return;}
  const btn=document.getElementById("submit-btn");
  btn.disabled=true; btn.textContent="送出中…";
  const payload={action:"addBooking",date:fmt(dv),time:selectedSlot,name,
    treatment:txArr.join("＋"),staff:selectedStaff,note:noteFull,clientType:ct};
  try{
    if(!getUrl()){
      await new Promise(r=>setTimeout(r,500));
      alert(`✅ 示範模式\n${name} ${fmt(dv)} ${selectedSlot} → ${selectedStaff}\n（請先設定 Apps Script 網址）`);
    } else {
      const res=await apiPost(payload);
      if(res.error) throw new Error(res.error);
      alert(`✅ 預約成功\n${name} ${fmt(dv)} ${selectedSlot}\n負責：${selectedStaff}${res.anesthesia==="麻"?" ｜ 需上麻":""}`);
    }
    // Reset
    selectedTx.clear(); selectedSlot="";
    document.querySelectorAll(".tx-chip.sel").forEach(c=>c.classList.remove("sel"));
    ["b-name","b-phone","b-note","b-date"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("slot-area").innerHTML="";
    document.getElementById("result-area").innerHTML="";
  }catch(e){alert("❌ "+e.message);}
  btn.disabled=false; btn.textContent="確認預約";
}

// ── LEAVE ─────────────────────────────────────────────────────
function initLeave(){
  const m=thisMonth();
  document.getElementById("leave-month").value=m;
  renderLeaveGrid();
}

function renderLeaveGrid(){
  const m=document.getElementById("leave-month").value||thisMonth();
  const[y,mo]=m.split("-");
  const days=new Date(+y,+mo,0).getDate();
  const data=getLeaveData(m);

  document.getElementById("leave-grid").innerHTML=STAFF.map(s=>{
    const cls=STAFF_CLS[s];
    const leaveSet=new Set(data[s]||[]);
    const dayBtns=Array.from({length:days},(_,i)=>{
      const d=String(i+1).padStart(2,"0");
      const on=leaveSet.has(d)?" on":"";
      return`<div class="leave-day${on}" onclick="toggleLeaveDay('${s}','${d}','${m}',this)">${+d}</div>`;
    }).join("");
    return`<div class="leave-col">
      <div class="lname chip-${cls}" style="background:var(--${cls}-l);color:var(--${cls})">${s}</div>
      ${dayBtns}
    </div>`;
  }).join("");
}

function toggleLeaveDay(staff,day,month,el){
  const data=getLeaveData(month);
  if(!data[staff]) data[staff]=[];
  const idx=data[staff].indexOf(day);
  if(idx>-1){ data[staff].splice(idx,1); el.classList.remove("on"); }
  else{ data[staff].push(day); el.classList.add("on"); }
  localStorage.setItem(`leave_${month}`,JSON.stringify(data));
}

function saveLeave(){
  alert("✅ 休假資料已儲存在本機\n排班與新增預約時會自動套用。");
}

    el.innerHTML=`<span class="sdot2 err"></span>連線失敗：${e.message}`;
  }
}
